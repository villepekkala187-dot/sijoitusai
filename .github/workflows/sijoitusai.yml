name: SijoitusAI

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  tarkista:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python sijoitusai_ilmoitukset.py
        timeout-minutes: 10
