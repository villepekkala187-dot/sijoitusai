<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SijoitusAI"/>
  <meta name="theme-color" content="#050810"/>
  <title>SijoitusAI</title>
  <link rel="manifest" href="manifest.json"/>

  <!-- iOS kotinäyttö-ikoni (emoji fallback SVG) -->
  <link rel="apple-touch-icon" href="icon.svg"/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #050810; color: #e8f0f8; }
    body { font-family: 'DM Mono', 'Courier New', monospace; overflow: hidden; }
    #root { height: 100%; display: flex; flex-direction: column; }

    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');

    @keyframes dot  { 0%,100%{opacity:.25;transform:scale(.7)} 50%{opacity:1;transform:scale(1)} }
    @keyframes up   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes glow { 0%,100%{box-shadow:0 0 8px #00d4aa22} 50%{box-shadow:0 0 22px #00d4aa55} }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #050810; }
    ::-webkit-scrollbar-thumb { background: #00d4aa33; border-radius: 2px; }

    input, textarea { outline: none !important; }
    button { cursor: pointer; }

    .hov:hover  { opacity: .75 !important; }
    .card:hover { border-color: #00d4aa44 !important; transform: translateY(-1px); }
    .chip:hover { background: #00d4aa1a !important; border-color: #00d4aa66 !important; color: #00d4aa !important; }

    /* Safe area for iPhone notch/home bar */
    .safe-bottom { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
    .safe-top    { padding-top:    max(14px, env(safe-area-inset-top)); }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ─── VAKIOT ────────────────────────────────────────────────────
const MARKET_SYMBOLS = [
  { symbol: "AAPL",     name: "Apple",         sector: "Teknologia" },
  { symbol: "MSFT",     name: "Microsoft",     sector: "Teknologia" },
  { symbol: "SPY",      name: "S&P 500 ETF",   sector: "ETF"        },
  { symbol: "LUG.ST",   name: "Lundin Gold",   sector: "Kaivos"     },
  { symbol: "MEKKO.HE", name: "Marimekko",     sector: "Helsinki"   },
  { symbol: "FIA1S.HE", name: "Finnair",       sector: "Helsinki"   },
  { symbol: "LYSX.DE",  name: "Euro Stoxx 50", sector: "ETF"        },
];

// ─── LOCALSTORAGE ──────────────────────────────────────────────
function lsGet(key, fb) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ─── VALUUTTAKURSSIT ───────────────────────────────────────────
async function fetchRate(symbol, workerUrl, fallback) {
  try {
    if (!workerUrl) return fallback;
    const r = await fetch(`${workerUrl}?symbol=${symbol}`);
    const d = await r.json();
    return d.price ? parseFloat(d.price) : fallback;
  } catch { return fallback; }
}

// ─── DATA FETCH ────────────────────────────────────────────────
async function fetchQuote(symbol, workerUrl) {
  if (!workerUrl) return null;
  try {
    const r = await fetch(`${workerUrl}?symbol=${symbol}`);
    const d = await r.json();
    if (!d.price) return null;
    return {
      price:     d.price,
      changePct: d.changePct,
      high:      d.high,
      low:       d.low,
      currency:  d.currency || "USD",
    };
  } catch { return null; }
}

async function fetchMarketNews(apiKey, workerUrl) {
  if (!apiKey || !workerUrl) return [];
  try {
    const res = await fetch(workerUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 800,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: `Hae tänään (${new Date().toLocaleDateString("fi-FI")}) tärkeimmät globaalit talousuutiset. Listaa 6-8 tapahtumaa lyhyinä lauseina (max 15 sanaa). Vastaa VAIN JSON: {"news":["uutinen1","uutinen2",...]}` }],
      }),
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text||"").join("") || "";
    const clean = text.replace(/```json|```/g,"").trim();
    return JSON.parse(clean).news || [];
  } catch { return []; }
}

// ─── VALUUTTAMUUNNOS (kurssi → EUR) ───────────────────────────
function toEur(price, currency, rates) {
  const p = parseFloat(price);
  if (isNaN(p)) return null;
  if (!currency || currency === "EUR") return p;
  if (currency === "USD") return p * rates.eurUsd;
  if (currency === "SEK") return p * rates.sekEur;
  if (currency === "GBP") return p * (rates.gbpEur || 1.16);
  return p;
}

// ─── SYSTEM PROMPT ─────────────────────────────────────────────
function buildSystemPrompt(stocks, portfolio, news, nordnet, rates) {
  const now = new Date().toLocaleString("fi-FI");
  const feeRates = {1:{pct:0.0006,min:3},2:{pct:0.001,min:5},3:{pct:0.0015,min:7},4:{pct:0.002,min:9}};
  const fee = feeRates[nordnet.level] || feeRates[3];

  const marketSection = stocks.filter(s=>s.data).length > 0
    ? `\n\n📊 KURSSITILANNE (${now}):\n` + stocks.filter(s=>s.data).map(s => {
        const eurPrice = toEur(s.data.price, s.data.currency, rates);
        return `• ${s.name} (${s.symbol}): €${eurPrice ? eurPrice.toFixed(2) : "—"} (${s.data.currency}) | ${parseFloat(s.data.changePct)>=0?"▲":"▼"} ${s.data.changePct}%`;
      }).join("\n")
    : "";

  let portfolioSection = "";
  if (portfolio.length > 0) {
    const rows = portfolio.map(p => {
      const st = stocks.find(s=>s.symbol===p.symbol);
      const curEur = st?.data?.price ? toEur(st.data.price, st.data.currency, rates) : null;
      const invested = (p.buyPrice*p.shares).toFixed(2);
      const nowVal = curEur ? (curEur*p.shares).toFixed(2) : "—";
      const gainE = curEur ? ((curEur-p.buyPrice)*p.shares).toFixed(2) : null;
      const gainP = curEur ? (((curEur-p.buyPrice)/p.buyPrice)*100).toFixed(2) : null;
      return `• ${p.name} (${p.symbol}): ${p.shares}kpl @ €${p.buyPrice} | Sijoitettu: €${invested} | Arvo: €${nowVal}${gainE!==null?` | Tuotto: ${gainE>=0?"+":""}€${gainE} (${gainP}%)`:""}`;
    });
    const ti = portfolio.reduce((s,p)=>s+p.buyPrice*p.shares,0);
    const tn = portfolio.reduce((s,p)=>{
      const st=stocks.find(x=>x.symbol===p.symbol);
      const curEur = st?.data?.price ? toEur(st.data.price, st.data.currency, rates) : null;
      return s + (curEur || p.buyPrice)*p.shares;
    },0);
    portfolioSection = `\n\n💼 SALKKU (kaikki euroina):\n${rows.join("\n")}\nYhteensä: €${ti.toFixed(2)} → €${tn.toFixed(2)} | Tuotto: ${tn-ti>=0?"+":""}€${(tn-ti).toFixed(2)}`;
  }

  const newsSection = news.length>0 ? `\n\n🌍 UUTISET:\n`+news.map(n=>`• ${n}`).join("\n") : "";
  const nordnetSection = `\n\n🏦 NORDNET Taso ${nordnet.level}: ${fee.pct*100}% / min €${fee.min} | Järkevä min-osto: €${(fee.min/fee.pct).toFixed(0)}`;
  const rateSection = `\n\n💱 VALUUTTAKURSSIT: 1 USD = ${rates.eurUsd.toFixed(4)} EUR | 1 SEK = ${rates.sekEur.toFixed(4)} EUR`;

  return `Olet huippukokenut sijoitusneuvoija-tekoäly. Yhdistä kurssit, uutiset ja salkku analyysiin. Kaikki hinnat ovat euroina. Huomioi aina Nordnet-kaupankäyntikulut suosituksissa. Muistuta lopussa: "⚠️ Tämä on yleistä markkina-analyysiä, ei virallista sijoitusneuvontaa." Vastaa suomeksi.${marketSection}${portfolioSection}${newsSection}${nordnetSection}${rateSection}`;
}

// ─── LOADING DOTS ──────────────────────────────────────────────
const Dots = () => (
  <div style={{display:"flex",gap:5,padding:"4px 0"}}>
    {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#00d4aa",animation:`dot 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}
  </div>
);

// ─── FIELD (App:n ulkopuolella — ei luoda uudelleen joka renderillä) ──
const Field = ({ph, val, onChange, type="text", onKeyDown}) => (
  <input placeholder={ph} value={val} type={type}
    onChange={onChange}
    onKeyDown={onKeyDown}
    style={{flex:1,minWidth:80,background:"#0a0f1a",border:"1px solid #2a4050",borderRadius:8,padding:"8px 10px",color:"#e8f0f8",fontFamily:"inherit",fontSize:13}}/>
);

// ─── APP ────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]         = useState("chat");
  const [messages, setMessages] = useState([]);
  const [input, setInput]     = useState("");
  const [loading, setLoading] = useState(false);

  const [stocks, setStocks]         = useState(MARKET_SYMBOLS.map(s=>({...s,data:null})));
  const [news, setNews]             = useState([]);
  const [loadingMarket, setLM]      = useState(false);
  const [loadingNews, setLN]        = useState(false);
  const [lastUpdated, setLastUpd]   = useState(null);

  const [portfolio, setPortfolio]   = useState(()=>lsGet("sijoitus_portfolio",[]));
  const [newPos, setNewPos]         = useState({symbol:"",name:"",shares:"",buyPrice:""});
  const [posError, setPosError]     = useState("");

  const [rates, setRates] = useState({ eurUsd: 0.92, sekEur: 0.088 });

  const [nordnet, setNordnet]       = useState(()=>lsGet("sijoitus_nordnet",{level:3}));
  const [antKey, setAntKey]         = useState(()=>lsGet("sijoitus_antkey",""));
  const [antKeyInput, setAntKeyInput] = useState(()=>lsGet("sijoitus_antkey",""));
  const [cfUrl, setCfUrl]           = useState(()=>lsGet("sijoitus_cfurl",""));
  const [cfUrlInput, setCfUrlInput] = useState(()=>lsGet("sijoitus_cfurl",""));

  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  useEffect(()=>{ refreshAll(); }, []);
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages,loading]);
  useEffect(()=>{ lsSet("sijoitus_portfolio",portfolio); }, [portfolio]);

  async function refreshAll() {
    setLM(true); setLN(true);
    const workerUrl = cfUrl || lsGet("sijoitus_cfurl","");
    const [quotes, eurUsdRate, sekEurRate] = await Promise.all([
      Promise.all(MARKET_SYMBOLS.map(s=>fetchQuote(s.symbol, workerUrl))),
      fetchRate("EURUSD=X", workerUrl, 0.92),
      fetchRate("SEKEUR=X", workerUrl, 0.088),
    ]);
    const newRates = { eurUsd: eurUsdRate, sekEur: sekEurRate };
    setRates(newRates);
    setStocks(MARKET_SYMBOLS.map((s,i)=>({...s,data:quotes[i]})));
    setLastUpd(new Date());
    setLM(false);
    const currentAntKey = antKey || lsGet("sijoitus_antkey","");
    const n = await fetchMarketNews(currentAntKey, workerUrl);
    setNews(n); setLN(false);
  }

  async function sendMessage(text) {
    const msg = text||input.trim();
    if (!msg||loading) return;
    setInput("");
    const hist = [...messages,{role:"user",content:msg}];
    setMessages(hist); setLoading(true);
    try {
      const workerUrl = cfUrl || lsGet("sijoitus_cfurl","");
      if (!workerUrl) {
        setMessages([...hist,{role:"assistant",content:"⚠️ Syötä Cloudflare Worker -osoite Asetuksiin ensin!"}]);
        setLoading(false);
        return;
      }
      const currentAntKey = antKey || lsGet("sijoitus_antkey","");
      const res = await fetch(workerUrl,{
        method:"POST", headers:{"Content-Type":"application/json","x-api-key":currentAntKey},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          system: buildSystemPrompt(stocks,portfolio,news,nordnet,rates),
          messages: hist,
        }),
      });
      const data = await res.json();
      const reply = data.content?.map(b=>b.text||"").join("")||"Virhe.";
      setMessages([...hist,{role:"assistant",content:reply}]);
    } catch {
      setMessages([...hist,{role:"assistant",content:"⚠️ Yhteysvirhe. Tarkista että Anthropic API-avain ja Worker-osoite on syötetty Asetuksiin."}]);
    } finally {
      setLoading(false);
      setTimeout(()=>inputRef.current?.focus(),100);
    }
  }

  function addPosition() {
    setPosError("");
    if (!newPos.symbol.trim()||!newPos.name.trim()) { setPosError("Täytä ticker ja nimi."); return; }
    if (!newPos.shares||isNaN(newPos.shares)||parseFloat(newPos.shares)<=0) { setPosError("Syötä kelvollinen kappalemäärä."); return; }
    if (!newPos.buyPrice||isNaN(newPos.buyPrice)||parseFloat(newPos.buyPrice)<=0) { setPosError("Syötä kelvollinen hinta (euroina)."); return; }
    setPortfolio(prev=>[...prev,{
      symbol: newPos.symbol.toUpperCase().trim(),
      name:   newPos.name.trim(),
      shares: parseFloat(newPos.shares),
      buyPrice: parseFloat(newPos.buyPrice),
    }]);
    setNewPos({symbol:"",name:"",shares:"",buyPrice:""});
  }

  const cc = p => parseFloat(p)>0?"#00d4aa":parseFloat(p)<0?"#ff5566":"#9fb3c5";

  function priceToEur(priceStr, currency) {
    const eur = toEur(priceStr, currency, rates);
    return eur !== null ? eur.toFixed(2) : "—";
  }

  function fmt(text) {
    return text.split("\n").map((line,i)=>{
      if (/^\*\*(.+)\*\*$/.test(line)) return <p key={i} style={{fontWeight:700,color:"#00d4aa",margin:"10px 0 3px"}}>{line.replace(/\*\*/g,"")}</p>;
      if (line.startsWith("• ")||line.startsWith("- ")) return <p key={i} style={{margin:"3px 0",paddingLeft:14,borderLeft:"2px solid #00d4aa33"}}>{line.slice(2)}</p>;
      if (line==="") return <br key={i}/>;
      return <p key={i} style={{margin:"3px 0",lineHeight:1.75}}>{line}</p>;
    });
  }

  const ti = portfolio.reduce((s,p)=>s+p.buyPrice*p.shares,0);
  const tn = portfolio.reduce((s,p)=>{
    const st=stocks.find(x=>x.symbol===p.symbol);
    if (!st?.data?.price) return s + p.buyPrice*p.shares;
    const eurPrice = toEur(st.data.price, st.data.currency, rates);
    return s + (eurPrice || p.buyPrice)*p.shares;
  },0);
  const tg = tn-ti;
  const tp = ti>0?(tg/ti*100):0;

  return (
    <div style={{height:"100%",background:"#050810",display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* HEADER */}
      <div className="safe-top" style={{padding:"0 16px 10px",borderBottom:"1px solid #00d4aa15",background:"#080c14",flexShrink:0,paddingTop:"max(14px,env(safe-area-inset-top))"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#00d4aa,#0088cc)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,animation:"glow 3s ease infinite"}}>📈</div>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"#fff"}}>SIJOITUS<span style={{color:"#00d4aa"}}>AI</span></div>
              <div style={{fontSize:9,color:"#9ab0c0",letterSpacing:"0.1em",textTransform:"uppercase"}}>Reaaliaikainen · Uutiset · Salkku</div>
            </div>
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            {lastUpdated && <span style={{fontSize:9,color:"#9ab0c0"}}>{lastUpdated.toLocaleTimeString("fi-FI")}</span>}
            <span style={{fontSize:10,color:"#00d4aa",fontWeight:700}}>€ EUR</span>
            <button className="hov" onClick={()=>refreshAll()} disabled={loadingMarket}
              style={{background:"transparent",border:"1px solid #00d4aa33",borderRadius:6,padding:"4px 10px",color:"#00d4aa",fontSize:11,fontFamily:"inherit"}}>
              {loadingMarket?"⟳…":"⟳"}
            </button>
          </div>
        </div>
        <div style={{display:"flex",gap:3}}>
          {[["chat","💬 Chat"],["portfolio","💼 Salkku"],["settings","⚙️"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{
              flex: id==="settings"?0:1,
              background:tab===id?"#00d4aa18":"transparent",
              border:`1px solid ${tab===id?"#00d4aa44":"#1a2535"}`,
              borderRadius:7,padding:"6px 8px",
              color:tab===id?"#00d4aa":"#7a8fa3",
              fontSize:12,fontFamily:"inherit",transition:"all .2s"
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* TICKER */}
      <div style={{background:"#070b12",borderBottom:"1px solid #00d4aa0d",padding:"6px 16px",overflowX:"auto",flexShrink:0}}>
        <div style={{display:"flex",gap:16}}>
          {stocks.map(s=>(
            <div key={s.symbol} style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
              <span style={{fontSize:10,color:"#b0c4d4"}}>{s.symbol}</span>
              {s.data
                ? <><span style={{fontSize:12,fontWeight:600,color:"#fff"}}>€{priceToEur(s.data.price, s.data.currency)}</span>
                     <span style={{fontSize:10,color:cc(s.data.changePct),fontWeight:600}}>{parseFloat(s.data.changePct)>=0?"▲":"▼"}{Math.abs(s.data.changePct)}%</span></>
                : <span style={{fontSize:10,color:"#5a7a8a"}}>{loadingMarket?"…":"—"}</span>
              }
            </div>
          ))}
        </div>
      </div>

      {/* ══ CHAT TAB ══ */}
      {tab==="chat" && <>
        <div style={{padding:"8px 16px 0",flexShrink:0,overflowX:"auto"}}>
          <div style={{display:"flex",gap:7,minWidth:"max-content"}}>
            {stocks.filter(s=>s.data).map(s=>(
              <div key={s.symbol} className="card"
                onClick={()=>sendMessage(`Analysoi ${s.name} tilanne nyt`)}
                style={{background:"#0a0f1a",border:"1px solid #00d4aa1a",borderRadius:9,padding:"8px 12px",cursor:"pointer",transition:"all .2s",minWidth:110}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                  <span style={{fontSize:10,color:"#7a8fa3"}}>{s.symbol}</span>
                  <span style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:parseFloat(s.data.changePct)>=0?"#00d4aa12":"#ff556612",color:cc(s.data.changePct),fontWeight:700}}>
                    {parseFloat(s.data.changePct)>=0?"+":""}{s.data.changePct}%
                  </span>
                </div>
                <div style={{fontSize:15,fontWeight:700,color:"#fff",fontFamily:"'Syne',sans-serif"}}>€{priceToEur(s.data.price, s.data.currency)}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
          {messages.length===0 && (
            <div style={{textAlign:"center",padding:"16px 0",animation:"up .5s ease"}}>
              <p style={{color:"#9ab0c0",fontSize:12,marginBottom:12,lineHeight:1.7}}>
                Minulla on <span style={{color:"#00d4aa"}}>kurssit</span>, <span style={{color:"#00d4aa"}}>uutiset</span> ja <span style={{color:"#00d4aa"}}>salkkusi</span> käytössä.
              </p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
                {["Analysoi salkkuni nyt","Mihin sijoittaisit 1000€?","Pitäisikö minun myydä jotain?","Miten maailmantilanne vaikuttaa?"].map(q=>(
                  <button key={q} className="chip" onClick={()=>sendMessage(q)}
                    style={{background:"transparent",border:"1px solid #2a4050",borderRadius:16,padding:"5px 12px",color:"#aac4d4",fontSize:11,fontFamily:"inherit",transition:"all .2s"}}>
                    {q}
                  </button>
                ))}
              </div>
            </div>
          )}
